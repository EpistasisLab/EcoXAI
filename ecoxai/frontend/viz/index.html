<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disease Factor Network — Multi-Model Visualizer</title>
  <link rel="icon" href="data:," /><!-- silence favicon.ico 404 -->
  <!-- Self-hosted, pinned, self-contained bundles. No external CDN at runtime, no
       importmap, ONE three instance (bundled inside 3d-force-graph). This removes the
       entire class of "multiple three" / version-mismatch / missing-subpath failures. -->
  <script src="./vendor/d3.min.js"></script>
  <script src="./vendor/3d-force-graph.min.js"></script>
  <style>
    :root {
      --bg:#0b0f14; --bg2:#0f1419; --panel:rgba(22,28,37,0.72); --border:#243040;
      --text:#e8edf3; --muted:#8a93a0; --accent:#5eead4; --accent2:#60a5fa;
    }
    * { box-sizing: border-box; }
    html, body { height:100%; }
    body {
      margin:0; font-family:'Inter', system-ui, -apple-system, sans-serif;
      background:radial-gradient(1200px 800px at 70% -10%, #16202c 0%, var(--bg) 60%);
      color:var(--text); overflow:hidden;
    }
    header {
      position:absolute; top:14px; right:14px; z-index:5; padding:9px 12px;
      display:flex; gap:14px; align-items:center; flex-wrap:wrap;
      background:var(--panel); border:1px solid var(--border); border-radius:10px;
      backdrop-filter:blur(8px); box-shadow:0 8px 30px rgba(0,0,0,0.4);
    }
    header h1 {
      font-size:15px; margin:0; font-weight:700; letter-spacing:0.3px;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip:text; background-clip:text; color:transparent;
    }
    .meta { color:var(--muted); font-size:12.5px; font-variant-numeric:tabular-nums; }
    #toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .ctrl { display:flex; gap:6px; align-items:center; }
    select, button {
      background:var(--panel); color:var(--text); border:1px solid var(--border);
      border-radius:8px; padding:6px 11px; font-size:12.5px; cursor:pointer;
      transition:border-color .15s, background .15s;
    }
    select:hover, button:hover { border-color:var(--accent2); }
    .seg { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .seg button { border:none; border-radius:0; background:transparent; padding:6px 14px; }
    .seg button.active { background:linear-gradient(90deg, var(--accent2), var(--accent)); color:#06121a; font-weight:600; }
    input[type=range] { accent-color:var(--accent); width:110px; }
    #stage { position:relative; width:100vw; height:100vh; }
    #graph, #graph3d, #labels3d { position:absolute; inset:0; width:100%; height:100%; }
    #graph3d, #labels3d { display:none; }
    #labels3d { pointer-events:none; overflow:hidden; }
    #labels3d .lbl { position:absolute; top:0; left:0; white-space:nowrap; font-weight:600;
      padding:1px 5px; border-radius:4px; background:rgba(11,15,20,0.60); line-height:1.2;
      will-change:transform,opacity; text-shadow:0 1px 2px #000; }
    .link { stroke-linecap:round; transition:stroke-opacity .2s; }
    .node circle { stroke:#0b0f14; stroke-width:1.5px; cursor:pointer; transition:opacity .2s; }
    .node text { font-size:11px; fill:var(--text); pointer-events:none; paint-order:stroke;
                 stroke:#0b0f14; stroke-width:3px; transition:opacity .2s; }
    #tooltip {
      position:absolute; z-index:10; background:var(--panel); border:1px solid var(--border);
      border-radius:8px; padding:9px 11px; font-size:12px; max-width:280px; line-height:1.5;
      pointer-events:none; opacity:0; backdrop-filter:blur(8px); box-shadow:0 8px 30px rgba(0,0,0,0.5);
    }
    #legend {
      position:absolute; bottom:18px; left:18px; z-index:4; background:var(--panel);
      border:1px solid var(--border); border-radius:10px; padding:11px 13px; font-size:12px;
      backdrop-filter:blur(8px); box-shadow:0 8px 30px rgba(0,0,0,0.4);
    }
    #legend b { font-size:11px; text-transform:uppercase; letter-spacing:0.6px; color:var(--muted); }
    #legend div { display:flex; align-items:center; gap:7px; margin:4px 0; }
    #legend span.dot { width:11px; height:11px; border-radius:50%; display:inline-block; box-shadow:0 0 8px currentColor; }
    #err { position:absolute; z-index:20; top:64px; left:50%; transform:translateX(-50%);
           max-width:80vw; display:none; background:#3a1418; border:1px solid #e15759; color:#ffd7d9;
           border-radius:8px; padding:10px 14px; font:12.5px ui-monospace, monospace; white-space:pre-wrap; }
  </style>
</head>
<body>
  <header>
    <div id="toolbar">
      <div class="ctrl">
        <label class="meta">data</label>
        <select id="dataSource">
          <option value="../data/ecoxai_graph.json">ecoxai_graph.json (ADSP · biotype-coloured)</option>
          <option value="../data/ecoxai_models.json">ecoxai_models.json (ADSP feature importance)</option>
          <option value="../data/sample_models.json">sample_models.json (multi-model)</option>
          <option value="../data/sample_graph.json">sample_graph.json</option>
          <option value="../extraction/data/output/graph.json">extraction/output/graph.json</option>
        </select>
      </div>
      <div class="ctrl">
        <label class="meta">min importance <b id="thVal" style="color:var(--accent)">0</b></label>
        <input type="range" id="threshold" min="0" max="1" step="0.001" value="0" />
      </div>
      <div class="seg" id="viewToggle">
        <button data-mode="2d" class="active">2D</button>
        <button data-mode="3d">3D</button>
      </div>
      <button id="reload">reload</button>
    </div>
  </header>
  <div id="stage">
    <svg id="graph"></svg>
    <div id="graph3d"></div>
    <div id="labels3d"></div>
  </div>
  <div id="err"></div>
  <div id="tooltip"></div>
  <div id="legend"></div>
  <script type="module" src="./src/graph.js"></script>
</body>
</html>
