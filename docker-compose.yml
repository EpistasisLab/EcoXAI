services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8081:8081"
    volumes:
      - ./ecoxai/backend/data:/ecoxai/backend/data
      - ./ecoxai/backend/assets:/ecoxai/backend/assets
      - ./ecoxai/backend/datasets:/ecoxai/backend/datasets
      - ./ecoxai/backend/skills:/ecoxai/backend/skills
      - /var/run/docker.sock:/var/run/docker.sock
      - transformers_cache:/root/.cache
    environment:
      - LEAN_PORT=8081
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    image: python:3.12-slim
    working_dir: /app
    command: python3 -m http.server 3000
    ports:
      - "3000:3000"
    volumes:
      - ./ecoxai/frontend:/app:ro
    restart: unless-stopped

volumes:
  transformers_cache:
