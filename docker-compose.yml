services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8081:8081"
    volumes:
      - ./ecoxai/backend/data:/ecoxai/backend/data
      - ./ecoxai/backend/assets:/ecoxai/backend/assets
      - ./ecoxai/backend/datasets:/ecoxai/backend/datasets
      - ./ecoxai/backend/skills:/ecoxai/backend/skills
      - /var/run/docker.sock:/var/run/docker.sock
      - transformers_cache:/root/.cache
    environment:
      - LEAN_PORT=8081
      # Standard Anthropic API / local LLM
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - CLAUDE_MODEL=${CLAUDE_MODEL}
      # Azure Foundry — use ECOXAI_USE_FOUNDRY=1 (not CLAUDE_CODE_USE_FOUNDRY, which is
      # set automatically by active Claude Code sessions and must not bleed into Docker).
      - CLAUDE_CODE_USE_FOUNDRY=${ECOXAI_USE_FOUNDRY:-}
      - ANTHROPIC_FOUNDRY_RESOURCE=${ANTHROPIC_FOUNDRY_RESOURCE:-}
      - ANTHROPIC_FOUNDRY_API_KEY=${ANTHROPIC_FOUNDRY_API_KEY:-}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    image: python:3.12-slim
    working_dir: /app
    command: python3 -m http.server 3000
    ports:
      - "3000:3000"
    volumes:
      - ./ecoxai/frontend:/app:ro
    restart: unless-stopped

volumes:
  transformers_cache:
